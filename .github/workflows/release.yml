name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        type: string

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Configure
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSC_ENABLE_DEBUG=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"

      - name: Build
        shell: msys2 {0}
        run: cmake --build build -j

      - name: Package
        shell: msys2 {0}
        run: |
          mkdir dist
          cp build/sidescroler.exe dist/
          cp -r build/assets dist/
          # Copy winpthread DLL if the exe links it dynamically
          for dll in libwinpthread-1.dll; do
            src="/mingw64/bin/$dll"
            [ -f "$src" ] && cp "$src" dist/ || true
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidescroler-windows
          path: dist/

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libgl1-mesa-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev \
            libxext-dev libasound2-dev

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSC_ENABLE_DEBUG=ON

      - name: Build
        run: cmake --build build -j

      - name: Package
        run: |
          mkdir dist
          cp build/sidescroler dist/
          cp -r build/assets dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidescroler-linux
          path: dist/

  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Zip artifacts
        run: |
          cd artifacts
          zip -r sidescroler-windows.zip sidescroler-windows/
          zip -r sidescroler-linux.zip sidescroler-linux/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            artifacts/sidescroler-windows.zip
            artifacts/sidescroler-linux.zip
